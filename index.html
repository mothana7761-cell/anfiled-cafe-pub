<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Anfield Cafe Pub Menu</title>

  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <header class="hero">
    <div class="hero-overlay">
      <img src="logo.jpeg" class="logo" alt="Anfield Cafe Pub Logo" />

      <h1 id="siteTitle">Anfield Cafe Pub</h1>
      <p id="welcomeText">
        Welcome to Anfield Cafe Pub — food, drinks, shisha and great moments in Taksim.
      </p>

      <div class="language-buttons">
        <button class="active" onclick="setLanguage('en', this)">English</button>
        <button onclick="setLanguage('ar', this)">العربية</button>
        <button onclick="setLanguage('tr', this)">Türkçe</button>
      </div>

      <div class="search-box">
        <input id="searchInput" type="text" placeholder="Search in menu..." oninput="searchMenu()" />
      </div>
    </div>
  </header>

  <section class="categories-area">
    <h2 id="categoryTitle">Menu Categories</h2>
    <div id="categoriesGrid" class="categories-grid"></div>
  </section>

  <main id="menuContent" class="menu-content"></main>

  <section class="contact-section">
    <h2 id="contactTitle">Contact & Links</h2>

    <div class="contact-list">
      <a href="tel:+905313692933" class="contact-btn call">📞 Call Us</a>
      <a href="https://wa.me/905313692933" target="_blank" class="contact-btn whatsapp">💬 WhatsApp</a>
      <a href="https://search.google.com/local/writereview?placeid=ChIJHQ8tjZi3yhQRETskn37Cy0Q&utm_source=chatgpt.com" target="_blank" class="contact-btn review">⭐ Google Review</a>
      <a href="https://www.google.com/maps/search/?api=1&query=Anfield+Cafe+Pub+Istanbul" target="_blank" class="contact-btn location">📍 Location</a>
      <a href="https://www.instagram.com/anfield_cafepub/" target="_blank" class="contact-btn instagram">📸 Instagram</a>
    </div>
  </section>

  <footer>
    <strong>Anfield Cafe Pub</strong><br />
    Taksim, Istanbul<br />
    +90 531 369 29 33
  </footer>

  <a class="floating-whatsapp" href="https://wa.me/905313692933" target="_blank">
    WhatsApp
  </a>

  <script src="data.js"></script>
  <script src="script.js"></script>
</body>
</html>
