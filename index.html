<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Anfield Cafe Pub Menu</title>

<style>
:root{
  --black:#070707;
  --dark:#151515;
  --red:#b51612;
  --gold:#d4af37;
  --white:#fff;
}
*{box-sizing:border-box}
body{margin:0;font-family:Arial,sans-serif;background:var(--black);color:white}
.hero{
  min-height:55vh;
  background:linear-gradient(rgba(0,0,0,.55),rgba(0,0,0,.88)),url("background.jpeg");
  background-size:cover;
  background-position:center;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  padding:30px 16px;
}
.logo{width:95px;background:white;padding:5px;border-radius:16px}
h1{color:var(--gold);font-size:36px;margin:15px 0 8px}
.welcome{max-width:760px;margin:auto;color:#eee;line-height:1.7}
.langs{margin-top:18px;display:flex;gap:8px;justify-content:center;flex-wrap:wrap}
.langs button{border:1px solid var(--gold);background:transparent;color:white;padding:10px 16px;border-radius:25px;font-weight:bold}
.langs button.active{background:var(--red);border-color:var(--red)}
.search{width:100%;max-width:720px;margin-top:20px;padding:15px 20px;border:none;border-radius:30px;font-size:16px}
.section-title{text-align:center;color:var(--gold);font-size:30px;margin:30px 0 20px}
.categories{max-width:1100px;margin:auto;padding:0 15px 35px;display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:14px}
.cat{height:145px;border-radius:22px;overflow:hidden;position:relative;cursor:pointer;box-shadow:0 10px 25px rgba(0,0,0,.45)}
.cat img{width:100%;height:100%;object-fit:cover}
.cat:after{content:"";position:absolute;inset:0;background:linear-gradient(rgba(0,0,0,.05),rgba(0,0,0,.85))}
.cat span{position:absolute;z-index:2;bottom:13px;left:8px;right:8px;text-align:center;font-size:18px;font-weight:bold}
.cat small{display:block;color:#ddd;font-size:12px;margin-top:5px}
.menu{max-width:1100px;margin:auto;padding:0 15px 40px}
.back{background:var(--red);color:white;border:none;border-radius:25px;padding:12px 20px;font-weight:bold;margin-bottom:18px}
.items{display:grid;grid-template-columns:repeat(auto-fit,minmax(270px,1fr));gap:15px}
.item{background:white;color:#222;border-radius:20px;padding:18px;border-left:5px solid var(--red);box-shadow:0 8px 24px rgba(0,0,0,.35)}
.item-top{display:flex;justify-content:space-between;gap:12px}
.name{font-size:18px;font-weight:bold}
.price{font-weight:bold;color:var(--red);white-space:nowrap}
.desc{margin-top:8px;color:#555;line-height:1.5;font-size:14px}
.badge{display:inline-block;margin-left:6px;background:var(--gold);color:#111;padding:3px 7px;border-radius:10px;font-size:11px}
.contact{background:var(--dark);padding:35px 18px}
.contact h2{text-align:center;color:var(--gold);font-size:30px}
.btn{display:block;max-width:700px;margin:13px auto;text-align:center;text-decoration:none;color:white;padding:17px;border-radius:32px;font-weight:bold;font-size:18px}
.call{background:#333}.wa{background:#25D366}.review{background:var(--gold);color:#111}.map{background:var(--red)}.insta{background:#c13584}
footer{text-align:center;background:#000;padding:28px 16px;line-height:1.8}
footer strong{color:var(--gold)}
.float-wa{position:fixed;right:16px;bottom:16px;background:#25D366;color:white;text-decoration:none;padding:14px 18px;border-radius:40px;font-weight:bold;z-index:50}
[dir="rtl"] .float-wa{right:auto;left:16px}
@media(max-width:600px){.hero{min-height:48vh}.logo{width:80px}h1{font-size:29px}.cat{height:130px}}
</style>
</head>

<body>

    <p id="welcome" class="welcome">Welcome to Anfield Cafe Pub — food, drinks, shisha and great moments in Taksim.</p>

    <div class="langs">
      <button class="active" onclick="setLang('en',this)">English</button>
      <button onclick="setLang('ar',this)">العربية</button>
      <button onclick="setLang('tr',this)">Türkçe</button>
    </div>

    <input id="search" class="search" placeholder="Search in menu..." oninput="searchMenu()">
  </div>
</header>

<h2 id="catTitle" class="section-title">Menu Categories</h2>
<div id="categories" class="categories"></div>

<main id="menu" class="menu"></main>

<section class="contact">
  <h2 id="contactTitle">Contact & Links</h2>
  <a class="btn call" href="tel:+905313692933">📞 Call Us</a>
  <a class="btn wa" href="https://wa.me/905313692933" target="_blank">💬 WhatsApp</a>
  <a class="btn review" href="https://search.google.com/local/writereview?placeid=ChIJHQ8tjZi3yhQRETskn37Cy0Q&utm_source=chatgpt.com" target="_blank">⭐ Google Review</a>
  <a class="btn map" href="https://www.google.com/maps/search/?api=1&query=Anfield+Cafe+Pub+Istanbul" target="_blank">📍 Location</a>
  <a class="btn insta" href="https://www.instagram.com/anfield_cafepub/" target="_blank">📸 Instagram</a>
</section>

<footer>
  <strong>Anfield Cafe Pub</strong><br>
  Taksim, Istanbul<br>
  +90 531 369 29 33
</footer>

<a class="float-wa" href="https://wa.me/905313692933" target="_blank">WhatsApp</a>

  {cat:"starters",price:"Ask",name:{en:"Mozzarella Sticks",ar:"أصابع موزاريلا",tr:"Mozzarella Çubukları"},desc:{en:"Fried mozzarella sticks.",ar:"أصابع موزاريلا مقلية.",tr:"Kızarmış mozzarella."}},

  {cat:"meze",price:"Ask",name:{en:"Hummus",ar:"حمص",tr:"Humus"},desc:{en:"Classic chickpea dip.",ar:"حمص كلاسيكي.",tr:"Klasik humus."}},

  {cat:"shisha",price:"Ask",name:{en:"Love 66",ar:"لوف 66",tr:"Love 66"},desc:{en:"Popular mixed flavor.",ar:"نكهة مميزة ومشهورة.",tr:"Popüler aroma."}},

  {cat:"alcohol",price:"Ask",name:{en:"Cocktails",ar:"كوكتيلات",tr:"Kokteyller"},desc:{en:"Ask staff for cocktail menu.",ar:"اسأل الموظف عن قائمة الكوكتيلات.",tr:"Kokteyl menüsü için personele sorunuz."}}

function setLang(l,btn){
  lang=l;
  document.body.dir=l==="ar"?"rtl":"ltr";
  document.querySelectorAll(".langs button").forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");
  title.textContent=ui[l].title;
  welcome.textContent=ui[l].welcome;
  search.placeholder=ui[l].search;
  catTitle.textContent=ui[l].categories;
  contactTitle.textContent=ui[l].contact;
  renderCats();
  menu.innerHTML="";
}

function count(cat){return items.filter(i=>i.cat===cat).length}

function renderCats(){
  categories.innerHTML="";
  cats.forEach(c=>{
    const card=document.createElement("div");
    card.className="cat";
    card.onclick=()=>openCat(c.id);
    card.innerHTML=`<img src="${c.img}"><span>${c.name[lang]}<small>${count(c.id)} ${ui[lang].items}</small></span>`;
    categories.appendChild(card);
  });
}

function openCat(id){
  const c=cats.find(x=>x.id===id);
  const list=items.filter(x=>x.cat===id);
  menu.innerHTML=`
    <button class="back" onclick="menu.innerHTML=''">${ui[lang].back}</button>
    <h2 class="section-title">${c.name[lang]}</h2>
    <div class="items">
      ${list.map(i=>`
        <div class="item">
          <div class="item-top">
            <div class="name">${i.name[lang]} ${i.best?'<span class="badge">Best</span>':''}</div>
            <div class="price">${i.price}</div>
          </div>
          <div class="desc">${i.desc[lang]}</div>
        </div>
      `).join("")}
    </div>
  `;
  menu.scrollIntoView({behavior:"smooth"});
}

function searchMenu(){
  const q=search.value.toLowerCase().trim();
  if(!q){menu.innerHTML="";return}
  const res=items.filter(i=>i.name.en.toLowerCase().includes(q)||i.name.ar.includes(q)||i.name.tr.toLowerCase().includes(q));
  menu.innerHTML=`
    <h2 class="section-title">Search Results</h2>
    <div class="items">
      ${res.map(i=>`
        <div class="item">
          <div class="item-top">
            <div class="name">${i.name[lang]}</div>
            <div class="price">${i.price}</div>
          </div>
          <div class="desc">${i.desc[lang]}</div>
        </div>
      `).join("")}
    </div>
  `;
}

renderCats();
</script>
