<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Anfield Cafe Pub Menu</title>

<style>
:root{
  --black:#0e0e0e;
  --dark:#171717;
  --red:#b40000;
  --gold:#d4af37;
  --white:#ffffff;
  --soft:#f5f5f5;
}
*{box-sizing:border-box}
body{margin:0;font-family:Arial,sans-serif;background:var(--black);color:white}
header{
  text-align:center;
  padding:28px 15px 35px;
  background:linear-gradient(rgba(0,0,0,.72),rgba(0,0,0,.85)),url("background.jpeg");
  background-size:cover;
  background-position:center;
}
.logo{width:120px;max-width:70%;border-radius:16px;background:white;padding:6px}
h1{margin:14px 0 6px;color:var(--gold);font-size:34px}
.welcome{max-width:700px;margin:auto;color:#eee;line-height:1.7}
.lang{margin-top:18px;display:flex;gap:8px;justify-content:center;flex-wrap:wrap}
.lang button{border:1px solid var(--gold);background:transparent;color:white;padding:10px 16px;border-radius:25px;font-weight:bold;cursor:pointer}
.lang button.active{background:var(--red);border-color:var(--red)}
.search{max-width:700px;margin:20px auto 0}
.search input{width:100%;padding:15px 20px;border:none;border-radius:30px;font-size:16px;outline:none}

.category-grid{
  max-width:1100px;
  margin:25px auto;
  padding:0 15px;
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
  gap:14px;
}
.category-card{
  height:135px;
  border-radius:20px;
  overflow:hidden;
  position:relative;
  cursor:pointer;
  box-shadow:0 10px 25px rgba(0,0,0,.35);
  border:1px solid rgba(255,255,255,.12);
}
.category-card img{width:100%;height:100%;object-fit:cover}
.category-card::after{
  content:"";
  position:absolute;inset:0;
  background:linear-gradient(rgba(0,0,0,.15),rgba(0,0,0,.78));
}
.category-card span{
  position:absolute;
  bottom:14px;
  left:12px;
  right:12px;
  z-index:2;
  color:white;
  font-size:18px;
  font-weight:bold;
  text-align:center;
}
.category-card.active{outline:3px solid var(--gold)}

main{max-width:1100px;margin:auto;padding:10px 15px 40px}
.section{display:none}
.section.active{display:block}
.section h2{text-align:center;color:var(--gold);font-size:30px;margin:22px 0}
.items{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(270px,1fr));
  gap:15px;
}
.item{
  background:white;
  color:#222;
  padding:18px;
  border-radius:18px;
  border-left:5px solid var(--red);
  box-shadow:0 8px 22px rgba(0,0,0,.3);
}
.item-top{display:flex;justify-content:space-between;gap:12px}
.name{font-size:18px;font-weight:bold;line-height:1.35}
.price{color:var(--red);font-weight:bold;white-space:nowrap}
.desc{margin-top:8px;color:#555;font-size:14px;line-height:1.6}

.contact{
  background:#1b1b1b;
  padding:35px 15px;
  text-align:center;
}
.contact h2{color:var(--gold);margin-top:0}
.contact-buttons{
  max-width:900px;
  margin:auto;
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
  gap:12px;
}
.btn{
  text-decoration:none;
  color:white;
  padding:14px;
  border-radius:28px;
  font-weight:bold;
}
.call{background:#333}.wa{background:#25D366}.review{background:var(--gold);color:#111}.map{background:var(--red)}.insta{background:#c13584}

.feedback{
  max-width:700px;
  margin:25px auto 0;
  background:white;
  color:#111;
  padding:18px;
  border-radius:20px;
}
textarea{
  width:100%;
  height:110px;
  padding:14px;
  border-radius:15px;
  border:1px solid #ddd;
  font-size:15px;
  resize:none;
}
.send{
  width:100%;
  margin-top:12px;
  border:none;
  background:var(--red);
  color:white;
  padding:14px;
  border-radius:25px;
  font-weight:bold;
  cursor:pointer;
}
footer{
  background:#000;
  color:white;
  text-align:center;
  padding:28px 16px;
  line-height:1.8;
}
footer strong{color:var(--gold)}
.float-wa{
  position:fixed;
  right:16px;
  bottom:16px;
  background:#25D366;
  color:white;
  text-decoration:none;
  padding:14px 18px;
  border-radius:40px;
  font-weight:bold;
  z-index:50;
}
[dir="rtl"] .float-wa{right:auto;left:16px}
@media(max-width:600px){
  .logo{width:95px}
  h1{font-size:28px}
  .category-card{height:120px}
}
</style>
</head>

<body>

<header>
  <img src="logo.jpeg" class="logo" alt="Anfield Logo">
  <h1 id="title">Anfield Cafe Pub</h1>
  <div class="welcome" id="welcome">
    Welcome to Anfield Cafe Pub — food, drinks, shisha and great moments in Taksim.
  </div>

  <div class="lang">
    <button class="active" onclick="setLang('en',this)">English</button>
    <button onclick="setLang('ar',this)">العربية</button>
    <button onclick="setLang('tr',this)">Türkçe</button>
  </div>

  <div class="search">
    <input id="searchInput" oninput="searchItems()" placeholder="Search in menu...">
  </div>
</header>

<div class="category-grid" id="categoryGrid"></div>
<main id="menu"></main>

<section class="contact">
  <h2 id="contactTitle">Contact & Feedback</h2>

  <div class="contact-buttons">
    <a class="btn call" href="tel:+905313692933">📞 Call</a>
    <a class="btn wa" href="https://wa.me/905313692933" target="_blank">💬 WhatsApp</a>
    <a class="btn review" href="https://search.google.com/local/writereview?placeid=ChIJHQ8tjZi3yhQRETskn37Cy0Q&utm_source=chatgpt.com" target="_blank">⭐ Review</a>
    <a class="btn map" href="https://www.google.com/maps/search/?api=1&query=Anfield+Cafe+Pub+Istanbul" target="_blank">📍 Location</a>
    <a class="btn insta" href="https://www.instagram.com/anfield_cafepub/" target="_blank">📸 Instagram</a>
  </div>

  <div class="feedback">
    <h3 id="feedbackTitle">Complaint / Suggestion / Compliment</h3>
    <textarea id="feedbackText" placeholder="Write your message here..."></textarea>
    <button class="send" id="feedbackBtn" onclick="sendFeedback()">Send on WhatsApp</button>
  </div>
</section>

<footer>
  <strong>Anfield Cafe Pub</strong><br>
  Taksim, Istanbul<br>
  +90 531 369 29 33
</footer>

<a class="float-wa" href="https://wa.me/905313692933" target="_blank">WhatsApp</a>

]},
{id:"alcohol",img:"https://images.unsplash.com/photo-1514362545857-3bc16c4c7d1b?auto=format&fit=crop&w=800&q=80",names:{en:"Alcohol",ar:"مشروبات كحولية",tr:"Alkollü İçecekler"},items:[

["Wine","نبيذ","Şarap","Ask staff for available options.","اسأل الموظف عن الخيارات المتوفرة.","Seçenekler için personele sorunuz.","Ask"],

function toItem(a){return{en:a[0],ar:a[1],tr:a[2],desc:{en:a[3],ar:a[4],tr:a[5]},price:a[6]};}

function render(){
  const cat=document.getElementById("categoryGrid");
  const menu=document.getElementById("menu");
  cat.innerHTML="";
  menu.innerHTML="";

  menuData.forEach((sec,i)=>{
    const c=document.createElement("div");
    c.className="category-card"+(i===0?" active":"");
    c.onclick=()=>show(sec.id,c);
    c.innerHTML=`<img src="${sec.img}"><span>${sec.names[lang]}</span>`;
    cat.appendChild(c);

    const s=document.createElement("section");
    s.className="section"+(i===0?" active":"");
    s.id=sec.id;
    s.innerHTML=`<h2>${sec.names[lang]}</h2><div class="items">${
      sec.items.map(toItem).map(item=>`
        <div class="item">
          <div class="item-top">
            <div class="name">${item[lang]}</div>
            <div class="price">${item.price}</div>
          </div>
          <div class="desc">${item.desc[lang]}</div>
        </div>
      `).join("")
    }</div>`;
    menu.appendChild(s);
  });
}

function show(id,card){
  document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
  document.querySelectorAll(".category-card").forEach(c=>c.classList.remove("active"));
  card.classList.add("active");
  document.getElementById(id).scrollIntoView({behavior:"smooth",block:"start"});
}

function setLang(l,btn){
  lang=l;
  document.body.dir=l==="ar"?"rtl":"ltr";
  document.getElementById("title").textContent=ui[l].title;
  document.getElementById("welcome").textContent=ui[l].welcome;
  document.getElementById("searchInput").placeholder=ui[l].search;
  document.getElementById("contactTitle").textContent=ui[l].contact;
  document.getElementById("feedbackTitle").textContent=ui[l].feedback;
  document.getElementById("feedbackText").placeholder=ui[l].placeholder;
  document.getElementById("feedbackBtn").textContent=ui[l].send;
  document.querySelectorAll(".lang button").forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");
  render();
}

function searchItems(){
  const term=document.getElementById("searchInput").value.toLowerCase();
  document.querySelectorAll(".item").forEach(item=>{
    item.style.display=item.innerText.toLowerCase().includes(term)?"block":"none";
  });
}

function sendFeedback(){
  const msg=document.getElementById("feedbackText").value || "Hello Anfield Cafe Pub, I would like to send feedback about my experience.";
  window.open("https://wa.me/"+phone+"?text="+encodeURIComponent(msg),"_blank");
}

render();
</script>

</body>
</html>
