<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Anfield Cafe Pub Menu</title>

<style>
:root{
  --black:#111;
  --dark:#1b1b1b;
  --red:#b40000;
  --gold:#d4af37;
  --card:#ffffff;
  --text:#222;
}
*{box-sizing:border-box}
body{margin:0;font-family:Arial,sans-serif;background:#111;color:#fff}
header{
  text-align:center;
  padding:35px 15px;
  background:linear-gradient(rgba(0,0,0,.75),rgba(0,0,0,.82)),
  url("https://images.unsplash.com/photo-1514933651103-005eec06c04b?auto=format&fit=crop&w=1600&q=80");
  background-size:cover;background-position:center;
}
.logo{width:185px;max-width:85%;border-radius:18px;background:#fff;padding:8px}
h1{font-size:38px;margin:18px 0 8px;color:var(--gold)}
.welcome{color:#eee;line-height:1.7;font-size:17px}
.lang{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-top:18px}
.lang button{border:1px solid var(--gold);background:transparent;color:#fff;padding:10px 16px;border-radius:25px;font-weight:bold}
.lang button.active{background:var(--red);border-color:var(--red)}
.quick{
  display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));
  gap:10px;max-width:850px;margin:22px auto 0;
}
.quick a{text-decoration:none;color:white;padding:13px;border-radius:25px;font-weight:bold}
.call{background:#333}.wa{background:#25D366}.review{background:var(--gold);color:#111!important}.map{background:var(--red)}.insta{background:#c13584}
.search{max-width:750px;margin:22px auto 0}
.search input{width:100%;padding:15px 20px;border:none;border-radius:30px;font-size:16px;outline:none}
.tabs{position:sticky;top:0;z-index:10;display:flex;gap:10px;overflow-x:auto;padding:13px;background:#000}
.tabs button{border:none;background:#fff;color:#111;padding:11px 16px;border-radius:25px;font-weight:bold;white-space:nowrap}
.tabs button.active{background:var(--red);color:#fff}
main{max-width:1100px;margin:auto;padding:25px 15px;background:#111}
.section{display:none}.section.active{display:block}
.section h2{text-align:center;font-size:32px;margin:25px 0;color:var(--gold)}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(270px,1fr));gap:15px}
.item{background:#fff;color:#222;padding:18px;border-radius:18px;box-shadow:0 8px 22px rgba(0,0,0,.35);border-left:5px solid var(--red)}
.item-top{display:flex;justify-content:space-between;gap:12px}
.name{font-size:18px;font-weight:bold;line-height:1.35}
.price{color:var(--red);font-weight:bold;white-space:nowrap}
.desc{margin-top:8px;color:#555;font-size:14px;line-height:1.6}
.feedback{background:#1b1b1b;padding:30px 16px;text-align:center}
.feedback-box{max-width:700px;margin:auto;background:#fff;color:#111;padding:18px;border-radius:20px}
textarea{width:100%;height:110px;padding:14px;border-radius:15px;border:1px solid #ddd;font-size:15px;resize:none}
.send{width:100%;margin-top:12px;border:none;background:var(--red);color:white;padding:14px;border-radius:25px;font-weight:bold}
footer{background:#000;color:#fff;text-align:center;padding:28px 16px;line-height:1.8}
footer strong{color:var(--gold)}
.float-wa{position:fixed;right:16px;bottom:16px;background:#25D366;color:white;text-decoration:none;padding:14px 18px;border-radius:40px;font-weight:bold;z-index:30}
[dir="rtl"] .float-wa{right:auto;left:16px}
@media(max-width:600px){h1{font-size:30px}.section h2{font-size:26px}}
</style>
</head>

<body>

<header>
  <img src="logo.jpeg" class="logo" alt="Anfield Logo">
  <h1 id="title">Anfield Cafe Pub</h1>
  <div class="welcome" id="welcome">
    Welcome to Anfield Cafe Pub — food, drinks, shisha and great moments in Taksim.
  </div>

  <div class="lang">
    <button class="active" onclick="setLang('en',this)">English</button>
    <button onclick="setLang('ar',this)">العربية</button>
    <button onclick="setLang('tr',this)">Türkçe</button>
  </div>

  <div class="quick">
    <a class="call" href="tel:+905313692933">📞 Call</a>
    <a class="wa" href="https://wa.me/905313692933" target="_blank">💬 WhatsApp</a>
    <a class="review" href="https://search.google.com/local/writereview?placeid=ChIJHQ8tjZi3yhQRETskn37Cy0Q&utm_source=chatgpt.com" target="_blank">⭐ Review</a>
    <a class="map" href="https://www.google.com/maps/search/?api=1&query=Anfield+Cafe+Pub+Istanbul" target="_blank">📍 Location</a>
    <a class="insta" href="https://www.instagram.com/anfield_cafepub/" target="_blank">📸 Instagram</a>
  </div>

  <div class="search">
    <input id="searchInput" oninput="searchItems()" placeholder="Search in menu...">
  </div>
</header>

<nav class="tabs" id="tabs"></nav>
<main id="menu"></main>

<section class="feedback">
  <div class="feedback-box">
    <h2 id="feedbackTitle">Complaint / Suggestion / Compliment</h2>
    <textarea id="feedbackText" placeholder="Write your message here..."></textarea>
    <button class="send" id="feedbackBtn" onclick="sendFeedback()">Send on WhatsApp</button>
  </div>
</section>

<footer>
  <strong>Anfield Cafe Pub</strong><br>
  Taksim, Istanbul<br>
  +90 531 369 29 33
</footer>

<a class="float-wa" href="https://wa.me/905313692933" target="_blank">WhatsApp</a>

function toItem(a){return{en:a[0],ar:a[1],tr:a[2],desc:{en:a[3],ar:a[4],tr:a[5]},price:a[6]};}

function render(){
const tabs=document.getElementById("tabs");
const menu=document.getElementById("menu");
tabs.innerHTML="";menu.innerHTML="";
menuData.forEach((sec,i)=>{
const b=document.createElement("button");
b.textContent=sec.names[lang];
if(i===0)b.classList.add("active");
b.onclick=()=>show(sec.id,b);
tabs.appendChild(b);
const s=document.createElement("section");
s.className="section"+(i===0?" active":"");
s.id=sec.id;
s.innerHTML=`<h2>${sec.names[lang]}</h2><div class="grid">${sec.items.map(toItem).map(item=>`
<div class="item">
<div class="item-top">
<div class="name">${item[lang]}</div>
<div class="price">${item.price}</div>
</div>
<div class="desc">${item.desc[lang]}</div>
</div>`).join("")}</div>`;
menu.appendChild(s);
});
}

function show(id,btn){
document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
document.getElementById(id).classList.add("active");
document.querySelectorAll(".tabs button").forEach(b=>b.classList.remove("active"));
btn.classList.add("active");
}

function setLang(l,btn){
lang=l;
document.body.dir=l==="ar"?"rtl":"ltr";
document.getElementById("title").textContent=ui[l].title;
document.getElementById("welcome").textContent=ui[l].welcome;
document.getElementById("searchInput").placeholder=ui[l].search;
document.getElementById("feedbackTitle").textContent=ui[l].feedback;
document.getElementById("feedbackText").placeholder=ui[l].placeholder;
document.getElementById("feedbackBtn").textContent=ui[l].send;
document.querySelectorAll(".lang button").forEach(b=>b.classList.remove("active"));
btn.classList.add("active");
render();
}

function searchItems(){
const term=document.getElementById("searchInput").value.toLowerCase();
document.querySelectorAll(".item").forEach(item=>{
item.style.display=item.innerText.toLowerCase().includes(term)?"block":"none";
});
}

function sendFeedback(){
const msg=document.getElementById("feedbackText").value || "Hello Anfield Cafe Pub, I would like to send feedback about my experience.";
window.open("https://wa.me/"+phone+"?text="+encodeURIComponent(msg),"_blank");
}

render();
</script>
</body>
</html>
